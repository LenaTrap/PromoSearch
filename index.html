<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkty z gazetki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      background-color: white;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border: 1px solid #ccc;
    }
    .card h3 {
      margin-bottom: 10px;
      font-size: 1.2rem;
    }
    .card p {
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Produkty z gazetki</h1>
  <div id="produkty" class="grid">
    Ładowanie produktów...
  </div>

  <script>
    const container = document.getElementById('produkty');

    fetch('http://127.0.0.1:8000/produkty')
      .then(res => res.json())
      .then(data => {
        container.innerHTML = ''; // czyścimy "Ładowanie..."
        data.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${p.nazwa}</h3>
            <p><strong>${p.cena} zł</strong></p>
            ${p.opis ? `<p>${p.opis}</p>` : ''}
          `;
          container.appendChild(card);
        });
      })
      .catch(err => {
        container.innerHTML = 'Błąd pobierania danych!';
        console.error(err);
      });
  </script>
</body>
</html>
