<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkty z gazetki</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button:hover {
      background-color: #eee;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>Produkty z gazetki</h1>

  <div class="controls">
    <input type="text" placeholder="Szukaj..." oninput="searchProducts(this.value)">

    <button onclick="sortProducts('asc')">Najtańsze</button>
    <button onclick="sortProducts('desc')">Najdroższe</button>

    <select onchange="filterByShop(this.value)">
      <option value="">Wszystkie sklepy</option>
      <option value="Lidl">Lidl</option>
      <option value="Biedronka">Biedronka</option>
    </select>
  </div>

  <div id="produkty" class="grid">
    Ładowanie produktów...
  </div>

  <script>
    let produktyData = [];
    const container = document.getElementById('produkty');

    // 🔥 TWÓJ PUBLICZNY LINK NGROK
    fetch('https://unestimable-bibi-helically.ngrok-free.dev/produkty', {
      headers: {
        "ngrok-skip-browser-warning": "true"
      }
    })
    .then(res => res.json())
    .then(data => {
      produktyData = data;
      renderProducts(produktyData);
    })
    .catch(err => {
      container.innerHTML = 'Błąd pobierania danych!';
      console.error(err);
    });

    // Render produktów
    function renderProducts(data) {
      container.innerHTML = '';

      if (data.length === 0) {
        container.innerHTML = '<p>Brak produktów</p>';
        return;
      }

      data.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h3>${p.nazwa}</h3>
          <p><strong>${p.cena} zł</strong></p>
          <p>${p.sklep}</p>
          ${p.opis ? `<p>${p.opis}</p>` : ''}
        `;

        container.appendChild(card);
      });
    }

    // Wyszukiwanie
    function searchProducts(query) {
      const filtered = produktyData.filter(p =>
        p.nazwa.toLowerCase().includes(query.toLowerCase())
      );
      renderProducts(filtered);
    }

    // Sortowanie
    function sortProducts(order) {
      const sorted = [...produktyData].sort((a, b) =>
        order === 'asc' ? a.cena - b.cena : b.cena - a.cena
      );
      renderProducts(sorted);
    }

    // Filtrowanie po sklepie
    function filterByShop(shop) {
      if (!shop) {
        renderProducts(produktyData);
      } else {
        renderProducts(produktyData.filter(p => p.sklep === shop));
      }
    }
  </script>
<a href="/designs/design1.html">Design1</a></p>
</body>
</html>
