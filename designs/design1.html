<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoSearch</title>
  <link rel="stylesheet" href="designs/design1.css">
</head>

<body>

  <h1>Produkty z gazetki</h1>
  <button id="themeToggle" class="theme-btn" onclick="toggleTheme()">
  <img id="themeIcon" src="/zdj/ksiezyc.png" />
  </button>

  <div class="controls">
    <input type="text" placeholder="Szukaj produktu..." oninput="searchProducts(this.value)">

    <button onclick="sortProducts('asc')">⬇ Najtańsze</button>
    <button onclick="sortProducts('desc')">⬆ Najdroższe</button>

    <div class="custom-select">
  <div class="selected" onclick="toggleDropdown()">Wszystkie sklepy</div>
  <div id="dropdown" class="dropdown hidden">
    <div class="option" onclick="filterByShop('')">
      <img src="/zdj/all.png" /> Wszystkie sklepy
    </div>
    <div class="option" onclick="filterByShop('Lidl')">
      <img src="/zdj/lidl.png" /> Lidl
    </div>
    <div class="option" onclick="filterByShop('Biedronka')">
      <img src="/zdj/biedronka.png" /> Biedronka
    </div>
  </div>
</div>
  </div>

  <div id="produkty" class="grid">
    <p class="status-text loading">Ładowanie produktów...</p>
  </div>

  <script>
    let darkMode = false;

    function toggleTheme() {
      darkMode = !darkMode;
      document.body.classList.toggle('dark');

      const icon = document.getElementById('themeIcon');

      if (darkMode) {
        icon.src = '/zdj/slonce.png';
      } else {
        icon.src = '/zdj/ksiezyc.png';
      }
    }

    // 🔥 SUPABASE CONFIG
    const SUPABASE_URL = "https://xtucjfzxwfxnlowjwxgk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dWNqZnp4d2Z4bmxvd2p3eGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDg0NzIsImV4cCI6MjA5MTM4NDQ3Mn0.CpIjKKhbXrNAnEefZYU-4T1jUWI7whpygeiXZggNvQs"; // <- wklej swój klucz

    let produktyData = [];
    const container = document.getElementById('produkty');

    // 🔥 POBIERANIE DANYCH Z SUPABASE
    async function loadData() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/produkty?select=*`, {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        });

        const data = await res.json();
        produktyData = data;
        renderProducts(produktyData);
      } catch (err) {
        container.innerHTML = '<p class="status-text">Błąd pobierania danych!</p>';
      }
    }

    loadData();

    function renderProducts(data) {
      container.innerHTML = '';

      if (data.length === 0) {
        container.innerHTML = '<p class="status-text">Brak produktów</p>';
        return;
      }

      data.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="tag">${p.promocja || 'PROMO'}</div>
          <h3>${p.nazwa}</h3>
          <div class="price">${p.cena} zł</div>
          <div class="shop">${p.sklep}</div>
          ${p.opis ? `<p>${p.opis}</p>` : ''}
        `;

        container.appendChild(card);
      });
    }

    function searchProducts(query) {
      const filtered = produktyData.filter(p =>
        p.nazwa.toLowerCase().includes(query.toLowerCase())
      );
      renderProducts(filtered);
    }

    function sortProducts(order) {
      const sorted = [...produktyData].sort((a, b) =>
        order === 'asc' ? a.cena - b.cena : b.cena - a.cena
      );
      renderProducts(sorted);
    }

    function toggleDropdown() {
      document.getElementById('dropdown').classList.toggle('hidden');
    }

    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('dropdown');
      if (!e.target.closest('.custom-select')) {
        dropdown.classList.add('hidden');
      }
    });

    function filterByShop(shop) {
      const selected = document.querySelector('.selected');

      if (shop === '') selected.textContent = 'Wszystkie sklepy';
      else selected.textContent = shop;

      if (!shop) renderProducts(produktyData);
      else renderProducts(produktyData.filter(p => p.sklep === shop));
    }

    // zamykanie dropdown po wyborze
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.getElementById('dropdown').classList.add('hidden');
      });
    });

</script>

</body>
</html>
